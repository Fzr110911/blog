<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>开始 · 房子瑞</title>
    <link rel="stylesheet" href="style.css" />
</head>
<body data-theme="light">
    <div class="progress-bar" id="progressBar"></div>
    <div class="back-to-top" id="backToTop">↑</div>

    <div class="container">
        <header>
            <h1>开始</h1>
            <time>2026-03-29</time>
        </header>

        <article>
            <p>这是「房子瑞的博客」的第一篇文章。</p>

            <p>一直以来都想有一个属于自己的地方，用来记录一些东西——技术的、生活的、思考的。</p>

            <h2>为什么要写博客</h2>
            <p>在这个信息过载的时代，写博客似乎是一件很“慢”的事。但我越来越觉得，慢一点反而很重要。</p>

            <h2>这个博客会写什么</h2>
            <p>
                关于技术：前端、Web 开发、工具链、性能优化。<br />
                关于产品：界面、交互、体验的一些观察和思考。<br />
                关于生活：阅读、习惯、时间管理，以及普通人的日常。
            </p>

            <h2>最后</h2>
            <p>这里是起点，也是记录。</p>
        </article>

        <footer>
            <a href="index.html">返回首页</a>
            <a href="#">归档</a>
        </footer>
    </div>

    <script>
        if (window.matchMedia("(prefers-color-scheme: dark)").matches) {
            document.documentElement.setAttribute("data-theme", "dark");
        }

        /* 阅读进度 */
        window.addEventListener("scroll", () => {
            const docHeight = document.documentElement.scrollHeight - window.innerHeight;
            const scrolled = (window.scrollY / docHeight) * 100;
            document.getElementById("progressBar").style.width = scrolled + "%";
        });

        /* 返回顶部 */
        const backBtn = document.getElementById("backToTop");
        window.addEventListener("scroll", () => {
            backBtn.classList.toggle("show", window.scrollY > 300);
        });

        backBtn.addEventListener("click", () => {
            window.scrollTo({ top: 0, behavior: "smooth" });
        });
    </script>
</body>
</html>
