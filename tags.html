<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="房子瑞博客的标签列表，按主题分类所有文章。" />
  <title>标签 · 房子瑞</title>
  <style>
    :root {
      --bg: #ffffff;
      --fg: #111111;
      --muted: #555555;
      --border: #eaeaea;
      --hover: #000000;
      --accent: #d94f70;
      --transition: 0.3s ease;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #121212;
        --fg: #eeeeee;
        --muted: #aaaaaa;
        --border: #333333;
        --hover: #ffffff;
        --accent: #ff7a94;
      }
    }
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      background-color: var(--bg);
      color: var(--fg);
      line-height: 1.7;
      transition: background-color var(--transition), color var(--transition);
    }
    .container {
      max-width: 820px;
      margin: 0 auto;
      padding: 80px 24px;
    }
    header {
      text-align: center;
      margin-bottom: 64px;
    }
    header h1 {
      font-size: 2.5rem;
      font-weight: 600;
      letter-spacing: -0.5px;
    }
    nav ul {
      list-style: none;
      display: flex;
      justify-content: center;
      gap: 28px;
      margin-top: 28px;
      flex-wrap: wrap;
    }
    nav ul li a {
      text-decoration: none;
      color: var(--fg);
      font-size: 0.96rem;
      transition: color var(--transition);
    }
    nav ul li a:hover {
      color: var(--hover);
    }
    .tag-section {
      margin-bottom: 56px;
    }
    .tag-title {
      font-size: 1.6rem;
      font-weight: 600;
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .tag-title .count {
      font-size: 1rem;
      font-weight: 400;
      color: var(--muted);
    }
    .tag-title.important {
      color: var(--accent);
    }
    .tag-list {
      list-style: none;
      border-left: 3px solid var(--border);
      padding-left: 20px;
    }
    .tag-list li {
      margin-bottom: 14px;
    }
    .tag-list time {
      font-size: 0.88rem;
      color: var(--muted);
      margin-right: 12px;
    }
    .tag-list a {
      text-decoration: none;
      color: var(--fg);
      font-size: 1.05rem;
      transition: color var(--transition);
    }
    .tag-list a:hover {
      color: var(--hover);
      text-decoration: underline;
    }
    footer {
      margin-top: 100px;
      text-align: center;
      font-size: 0.88rem;
      color: var(--muted);
      border-top: 1px solid var(--border);
      padding-top: 40px;
    }
    footer div {
      margin-top: 10px;
    }
    footer a {
      color: var(--muted);
      text-decoration: none;
      margin: 0 10px;
      transition: color var(--transition);
    }
    footer a:hover {
      color: var(--hover);
    }
    @media (max-width: 768px) {
      .container {
        padding: 40px 16px;
      }
      header h1 {
        font-size: 2rem;
      }
      nav ul {
        flex-direction: column;
        gap: 14px;
      }
    }
    @media (max-width: 480px) {
      header h1 {
        font-size: 1.8rem;
      }
      .container {
        padding: 30px 12px;
      }
      nav ul {
        gap: 10px;
      }
      nav ul li a {
        font-size: 0.9rem;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>标签</h1>
      <nav>
        <ul>
          <li><a href="index.html">首页</a></li>
          <li><a href="archive.html">归档</a></li>
          <li><a href="tags.html">标签</a></li>
          <li><a href="about.html">关于</a></li>
        </ul>
      </nav>
    </header>

    <main>
      <section class="tag-section">
        <h2 class="tag-title important">重要 <span class="count">(1)</span></h2>
        <ul class="tag-list">
          <li>
            <time datetime="2026-03-29">2026-03-29</time>
            <a href="start.html">开始</a>
          </li>
        </ul>
      </section>

      <section class="tag-section">
        <h2 class="tag-title">技术 <span class="count">(0)</span></h2>
        <ul class="tag-list"></ul>
      </section>

      <section class="tag-section">
        <h2 class="tag-title">产品 <span class="count">(0)</span></h2>
        <ul class="tag-list"></ul>
      </section>

      <section class="tag-section">
        <h2 class="tag-title">生活 <span class="count">(0)</span></h2>
        <ul class="tag-list"></ul>
      </section>

      <section class="tag-section">
        <h2 class="tag-title">阅读 <span class="count">(0)</span></h2>
        <ul class="tag-list"></ul>
      </section>
    </main>

    <footer>
      <p>© 2026 房子瑞 · 保留所有权利</p>
      <div>
        <a href="index.html">首页</a>
        <a href="about.html">关于</a>
      </div>
    </footer>
  </div>
</body>
</html>
