<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>今日-DeepSeek</title>
    <link rel="icon" type="image/png" href="logo.png">
    <style>
        :root {
            --bg: #f8f6f2;
            --card: #ffffff;
            --border: #e6e3de;
            --text: #2c2c2c;
            --text-secondary: #6b6b6b;
            --text-muted: #999;
            --accent: #1a1a1a;
            --accent-hover: #333;
            --divider: #eeecea;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: "Inter", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", "Noto Sans SC", -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.75;
            letter-spacing: 0.01em;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px 60px;
        }

        .page {
            width: 100%;
            max-width: 640px;
        }

        .header {
            text-align: center;
            padding: 48px 0 40px;
        }

        .header-icon {
            width: 48px;
            height: 48px;
            margin: 0 auto 20px;
            background: var(--accent);
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            font-weight: 700;
            color: #fff;
            letter-spacing: 0;
        }

        .header h1 {
            font-size: 22px;
            font-weight: 600;
            color: var(--text);
            letter-spacing: 0.02em;
        }

        .header p {
            font-size: 14px;
            color: var(--text-muted);
            margin-top: 6px;
            font-weight: 400;
        }

        .settings-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
        }

        .home-link {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            font-size: 13px;
            color: var(--text-muted);
            text-decoration: none;
            padding: 6px 12px;
            border-radius: 6px;
            letter-spacing: 0.02em;
        }

        .home-link:hover {
            color: var(--text);
            background: rgba(0,0,0,0.04);
        }

        .settings-btn {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            font-size: 13px;
            color: var(--text-muted);
            background: none;
            border: none;
            cursor: pointer;
            padding: 6px 12px;
            border-radius: 6px;
            font-family: inherit;
            letter-spacing: 0.02em;
        }

        .settings-btn:hover {
            color: var(--text);
            background: rgba(0,0,0,0.04);
        }

        .settings-btn svg {
            width: 15px;
            height: 15px;
            opacity: 0.5;
        }

        .api-key-panel {
            display: none;
            margin-bottom: 20px;
            padding: 18px 20px;
            background: var(--card);
            border-radius: 12px;
            border: 1px solid var(--border);
        }

        .api-key-panel.open {
            display: block;
        }

        .api-key-panel label {
            display: block;
            font-size: 12px;
            font-weight: 600;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.06em;
            margin-bottom: 10px;
        }

        .api-key-panel input {
            width: 100%;
            padding: 10px 14px;
            border: 1px solid var(--border);
            border-radius: 8px;
            font-size: 14px;
            font-family: inherit;
            color: var(--text);
            background: #fafaf8;
            letter-spacing: 0.02em;
            outline: none;
        }

        .api-key-panel input:focus {
            border-color: #aaa;
            background: #fff;
        }

        .api-key-panel .hint {
            font-size: 12px;
            color: var(--text-muted);
            margin-top: 8px;
        }

        .input-card {
            background: var(--card);
            border-radius: 14px;
            border: 1px solid var(--border);
            overflow: hidden;
        }

        .input-card textarea {
            width: 100%;
            min-height: 140px;
            padding: 20px 22px;
            border: none;
            font-size: 16px;
            font-family: inherit;
            color: var(--text);
            line-height: 1.75;
            letter-spacing: 0.02em;
            resize: vertical;
            outline: none;
            background: transparent;
        }

        .input-card textarea::placeholder {
            color: #c0bdb8;
        }

        .input-card-footer {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 16px;
            border-top: 1px solid var(--divider);
            background: #fdfdfc;
        }

        .input-card-footer .char-count {
            font-size: 12px;
            color: var(--text-muted);
        }

        .submit-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 10px 22px;
            background: var(--accent);
            color: #fff;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            font-family: inherit;
            letter-spacing: 0.03em;
            cursor: pointer;
        }

        .submit-btn:hover {
            background: var(--accent-hover);
        }

        .submit-btn:active {
            transform: scale(0.97);
        }

        .submit-btn:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
        }

        .submit-btn svg {
            width: 16px;
            height: 16px;
        }

        .response-card {
            display: none;
            margin-top: 20px;
            background: var(--card);
            border-radius: 14px;
            border: 1px solid var(--border);
            overflow: hidden;
        }

        .response-card.show {
            display: block;
        }

        .response-card-header {
            padding: 14px 22px;
            border-bottom: 1px solid var(--divider);
            font-size: 12px;
            font-weight: 600;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.06em;
            background: #fdfdfc;
        }

        .response-card-body {
            padding: 22px 24px;
        }

        .response-card-body .content {
            white-space: pre-wrap;
            word-wrap: break-word;
            font-size: 16px;
            line-height: 1.85;
            color: var(--text);
        }

        .response-card-body .loading-text {
            text-align: center;
            color: var(--text-muted);
            padding: 20px 0;
            font-size: 14px;
            letter-spacing: 0.02em;
        }

        .response-card-body .loading-dots::after {
            content: '';
            animation: dots 1.5s steps(3, end) infinite;
        }

        @keyframes dots {
            0%   { content: ''; }
            25%  { content: '.'; }
            50%  { content: '..'; }
            75%  { content: '...'; }
            100% { content: '...'; }
        }

        .response-card-body .error-box {
            color: #b33a3a;
            background: #fdf7f7;
            padding: 16px 18px;
            border-radius: 8px;
            font-size: 14px;
            line-height: 1.6;
            border: 1px solid #f0dada;
        }

        .empty-hint {
            text-align: center;
            padding: 48px 0 24px;
            color: var(--text-muted);
            font-size: 14px;
            letter-spacing: 0.02em;
        }

        .model-row {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 16px;
        }

        .model-btn {
            padding: 6px 16px;
            border: 1px solid var(--border);
            border-radius: 8px;
            background: var(--card);
            color: var(--text-muted);
            font-size: 13px;
            font-family: inherit;
            cursor: pointer;
            letter-spacing: 0.03em;
        }

        .model-btn:hover {
            border-color: #bbb;
            color: var(--text);
        }

        .model-btn.active {
            background: var(--accent);
            color: #fff;
            border-color: var(--accent);
        }

        .think-toggle-row {
            display: none;
            align-items: center;
            gap: 10px;
            margin-bottom: 16px;
        }

        .think-toggle-row.show {
            display: flex;
        }

        .think-label {
            font-size: 13px;
            color: var(--text-secondary);
            letter-spacing: 0.03em;
        }

        .think-switch {
            position: relative;
            width: 40px;
            height: 22px;
            flex-shrink: 0;
        }

        .think-switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }

        .think-slider {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: #ccc;
            border-radius: 11px;
            cursor: pointer;
            transition: background 0.2s;
        }

        .think-slider::before {
            content: '';
            position: absolute;
            width: 16px;
            height: 16px;
            left: 3px;
            bottom: 3px;
            background: #fff;
            border-radius: 50%;
            transition: transform 0.2s;
        }

        .think-switch input:checked + .think-slider {
            background: var(--accent);
        }

        .think-switch input:checked + .think-slider::before {
            transform: translateX(18px);
        }

        .reasoning-box {
            background: #f9f8f5;
            border-radius: 8px;
            border: 1px solid var(--divider);
            margin-bottom: 14px;
            overflow: hidden;
        }

        .reasoning-box-header {
            padding: 10px 16px;
            font-size: 12px;
            font-weight: 600;
            color: var(--text-muted);
            letter-spacing: 0.04em;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .reasoning-box-body {
            padding: 0 16px 14px;
            font-size: 14px;
            line-height: 1.7;
            color: var(--text-secondary);
            white-space: pre-wrap;
            word-wrap: break-word;
        }

        .conv-msg {
            margin-bottom: 16px;
        }

        .conv-msg-label {
            font-size: 11px;
            font-weight: 600;
            letter-spacing: 0.05em;
            margin-bottom: 4px;
            color: var(--text-muted);
            text-transform: uppercase;
            display: flex;
            align-items: baseline;
            gap: 8px;
        }

        .conv-msg-time {
            font-size: 10px;
            font-weight: 400;
            color: #c0bdb8;
            letter-spacing: 0.02em;
            text-transform: none;
            white-space: nowrap;
        }

        .conv-msg-content {
            font-size: 15px;
            line-height: 1.8;
            color: var(--text);
            white-space: pre-wrap;
            word-wrap: break-word;
        }

        .conv-msg-badge {
            display: inline-block;
            padding: 1px 8px;
            border-radius: 4px;
            font-size: 10px;
            font-weight: 600;
            letter-spacing: 0.04em;
            margin-top: 8px;
        }

        .conv-msg-badge.v4-inline {
            background: #e8f0fe;
            color: #1a6fcf;
        }

        .conv-msg-badge.r1-inline {
            background: #fce8e6;
            color: #c5221f;
        }

        .conv-divider {
            border: none;
            border-top: 1px solid var(--divider);
            margin: 14px 0;
        }

        .history-backdrop {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.3);
            z-index: 100;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.25s;
        }

        .history-backdrop.show {
            opacity: 1;
            pointer-events: auto;
        }

        .history-panel {
            position: fixed;
            top: 0; left: 0;
            width: 360px;
            max-width: 85vw;
            height: 100vh;
            background: #fff;
            z-index: 101;
            transform: translateX(-100%);
            transition: transform 0.3s ease;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            box-shadow: 2px 0 20px rgba(0,0,0,0.1);
        }

        .history-panel.show {
            transform: translateX(0);
        }

        .history-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 20px 20px 16px;
            border-bottom: 1px solid var(--divider);
            flex-shrink: 0;
        }

        .history-header h3 {
            font-size: 16px;
            font-weight: 600;
            color: var(--text);
            letter-spacing: 0.03em;
        }

        .history-header-actions {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .history-close-btn {
            width: 32px;
            height: 32px;
            border: none;
            background: none;
            cursor: pointer;
            color: var(--text-muted);
            font-size: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 6px;
        }

        .history-close-btn:hover {
            background: rgba(0,0,0,0.05);
            color: var(--text);
        }

        .history-new-btn {
            padding: 5px 12px;
            border: 1px solid var(--border);
            border-radius: 6px;
            background: var(--card);
            color: var(--text-secondary);
            font-size: 12px;
            font-family: inherit;
            cursor: pointer;
            letter-spacing: 0.03em;
        }

        .history-new-btn:hover {
            border-color: #bbb;
            color: var(--text);
        }

        .history-search-wrap {
            padding: 12px 20px;
            flex-shrink: 0;
        }

        .history-search-input {
            width: 100%;
            padding: 8px 14px;
            border: 1px solid var(--border);
            border-radius: 8px;
            font-size: 13px;
            font-family: inherit;
            color: var(--text);
            background: #fafaf8;
            outline: none;
            letter-spacing: 0.02em;
        }

        .history-search-input:focus {
            border-color: #aaa;
            background: #fff;
        }

        .history-filters {
            display: flex;
            gap: 6px;
            padding: 0 20px 12px;
            flex-shrink: 0;
        }

        .history-filter-btn {
            padding: 4px 12px;
            border: 1px solid var(--border);
            border-radius: 14px;
            background: var(--card);
            color: var(--text-muted);
            font-size: 12px;
            font-family: inherit;
            cursor: pointer;
            letter-spacing: 0.03em;
        }

        .history-filter-btn.active {
            background: var(--accent);
            color: #fff;
            border-color: var(--accent);
        }

        .history-list {
            flex: 1;
            overflow-y: auto;
            padding: 0 16px;
        }

        .history-item {
            padding: 14px 4px;
            border-bottom: 1px solid var(--divider);
            cursor: pointer;
            position: relative;
        }

        .history-item:hover {
            background: rgba(0,0,0,0.015);
        }

        .history-item-title {
            font-size: 14px;
            color: var(--text);
            font-weight: 500;
            letter-spacing: 0.02em;
            line-height: 1.4;
            margin-bottom: 6px;
            padding-right: 30px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .history-item-meta {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 11px;
            color: var(--text-muted);
        }

        .version-badge {
            padding: 1px 7px;
            border-radius: 4px;
            font-size: 10px;
            font-weight: 600;
            letter-spacing: 0.04em;
        }

        .version-badge.v4 {
            background: #e8f0fe;
            color: #1a6fcf;
        }

        .version-badge.r1 {
            background: #fce8e6;
            color: #c5221f;
        }

        .history-item-delete {
            position: absolute;
            top: 12px;
            right: 4px;
            width: 28px;
            height: 28px;
            border: none;
            background: none;
            cursor: pointer;
            color: #ccc;
            font-size: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 4px;
        }

        .history-item-delete:hover {
            color: #c5221f;
            background: rgba(196,43,43,0.06);
        }

        .history-item-rename {
            position: absolute;
            top: 12px;
            right: 34px;
            width: 28px;
            height: 28px;
            border: none;
            background: none;
            cursor: pointer;
            color: #ccc;
            font-size: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 4px;
        }

        .history-item-rename:hover {
            color: var(--text);
            background: rgba(0,0,0,0.04);
        }

        .history-title-edit-wrap {
            display: flex;
            align-items: center;
            gap: 6px;
            margin-bottom: 6px;
            padding-right: 62px;
        }

        .history-title-edit-input {
            flex: 1;
            padding: 4px 8px;
            border: 1px solid var(--accent);
            border-radius: 4px;
            font-size: 13px;
            font-family: inherit;
            color: var(--text);
            background: #fff;
            outline: none;
            letter-spacing: 0.02em;
            min-width: 0;
        }

        .history-title-edit-btn {
            width: 26px;
            height: 26px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .history-title-edit-confirm {
            background: var(--accent);
            color: #fff;
        }

        .history-title-edit-confirm:hover {
            background: var(--accent-hover);
        }

        .history-title-edit-cancel {
            background: none;
            color: var(--text-muted);
            border: 1px solid var(--border);
        }

        .history-title-edit-cancel:hover {
            border-color: #bbb;
            color: var(--text);
        }

        .history-empty {
            text-align: center;
            padding: 40px 20px;
            color: var(--text-muted);
            font-size: 13px;
            letter-spacing: 0.03em;
        }

        .history-footer {
            padding: 12px 20px;
            border-top: 1px solid var(--divider);
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .history-pagination {
            display: flex;
            align-items: center;
            gap: 4px;
            font-size: 12px;
            color: var(--text-muted);
        }

        .history-page-btn {
            width: 26px;
            height: 26px;
            border: 1px solid var(--border);
            border-radius: 4px;
            background: var(--card);
            cursor: pointer;
            font-size: 12px;
            color: var(--text-muted);
            font-family: inherit;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .history-page-btn:disabled {
            opacity: 0.35;
            cursor: not-allowed;
        }

        .history-page-btn:hover:not(:disabled) {
            border-color: #bbb;
            color: var(--text);
        }

        .history-export-btn {
            padding: 5px 14px;
            border: 1px solid var(--border);
            border-radius: 6px;
            background: var(--card);
            color: var(--text-secondary);
            font-size: 12px;
            font-family: inherit;
            cursor: pointer;
            letter-spacing: 0.03em;
        }

        .history-export-btn:hover {
            border-color: #bbb;
            color: var(--text);
        }

        .toast-container {
            position: fixed;
            top: 24px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 200;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            pointer-events: none;
        }

        .toast {
            padding: 10px 22px;
            background: var(--accent);
            color: #fff;
            border-radius: 8px;
            font-size: 13px;
            letter-spacing: 0.03em;
            animation: toastIn 0.3s ease, toastOut 0.3s ease 1.7s forwards;
            pointer-events: auto;
        }

        @keyframes toastIn {
            from { opacity: 0; transform: translateY(-12px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes toastOut {
            from { opacity: 1; transform: translateY(0); }
            to { opacity: 0; transform: translateY(-12px); }
        }

        @media (max-width: 520px) {
            body {
                padding: 16px 12px 40px;
            }

            .header {
                padding: 28px 0 24px;
            }

            .header h1 {
                font-size: 20px;
            }

            .input-card textarea {
                font-size: 15px;
                min-height: 120px;
                padding: 16px 18px;
            }

            .response-card-body {
                padding: 18px;
            }

            .response-card-body .content {
                font-size: 15px;
            }

            .submit-btn {
                padding: 10px 18px;
                font-size: 13px;
            }
        }
    </style>
</head>
<body>
    <div class="page">

        <div class="header">
            <div class="header-icon">DS</div>
            <h1>DeepSeek</h1>
            <p>每一次对话，都是一次探索</p>
        </div>

        <div class="settings-row">
            <a href="index.html" class="home-link">← 首页</a>
            <div style="display:flex;align-items:center;gap:4px;">
                <button class="settings-btn" onclick="toggleHistory()">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:15px;height:15px;opacity:0.5;">
                        <circle cx="12" cy="12" r="10"></circle>
                        <polyline points="12 6 12 12 16 14"></polyline>
                    </svg>
                    历史
                </button>
                <button class="settings-btn" onclick="toggleSettings()">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="12" cy="12" r="3"></circle>
                        <path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"></path>
                    </svg>
                    设置
                </button>
            </div>
        </div>

        <div class="api-key-panel" id="apiKeyPanel">
            <label for="apiKey">API Key</label>
            <input type="password" id="apiKey" placeholder="sk-xxxxxxxxxxxxxxxx">
            <div class="hint">密钥仅保存在本地浏览器，不会上传</div>
        </div>

        <div class="model-row" id="modelRow">
            <button class="model-btn active" data-model="deepseek-v4-flash" onclick="switchModel('deepseek-v4-flash')">V4 Flash</button>
            <button class="model-btn" data-model="deepseek-reasoner" onclick="switchModel('deepseek-reasoner')">R1</button>
        </div>

        <div class="think-toggle-row" id="thinkToggleRow">
            <label class="think-switch">
                <input type="checkbox" id="thinkCheckbox" onchange="toggleDeepThink()">
                <span class="think-slider"></span>
            </label>
            <span class="think-label">深度思考</span>
        </div>

        <div class="input-card">
            <textarea id="userInput" placeholder="输入你的问题..."></textarea>
            <div class="input-card-footer">
                <span class="char-count" id="charCount">0 / 4000</span>
                <button class="submit-btn" onclick="sendMessage()" id="sendBtn">
                    发送
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                        <line x1="22" y1="2" x2="11" y2="13"></line>
                        <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                    </svg>
                </button>
            </div>
        </div>

        <div class="empty-hint" id="emptyHint">输入问题并发送，获取 DeepSeek 的回答</div>

        <div class="response-card" id="responseCard">
            <div class="response-card-header">回答</div>
            <div class="response-card-body" id="responseBody"></div>
        </div>
    </div>

    <div class="history-backdrop" id="historyBackdrop" onclick="closeHistory()"></div>

    <div class="history-panel" id="historyPanel">
        <div class="history-header">
            <h3>聊天记录</h3>
            <div class="history-header-actions">
                <button class="history-new-btn" onclick="newConversation()">+ 新对话</button>
                <button class="history-close-btn" onclick="closeHistory()">✕</button>
            </div>
        </div>
        <div class="history-search-wrap">
            <input type="text" class="history-search-input" id="historySearch" placeholder="搜索标题..." oninput="renderHistory()">
        </div>
        <div class="history-filters" id="historyFilters">
            <button class="history-filter-btn active" data-filter="all" onclick="setHistoryFilter('all')">全部</button>
            <button class="history-filter-btn" data-filter="deepseek-v4-flash" onclick="setHistoryFilter('deepseek-v4-flash')">V4 Flash</button>
            <button class="history-filter-btn" data-filter="deepseek-reasoner" onclick="setHistoryFilter('deepseek-reasoner')">R1</button>
        </div>
        <div class="history-list" id="historyList"></div>
        <div class="history-footer">
            <div class="history-pagination" id="historyPagination"></div>
            <button class="history-export-btn" onclick="exportHistory()">导出全部</button>
        </div>
    </div>

    <div class="toast-container" id="toastContainer"></div>

    <script>
        var API_URL = 'https://api.deepseek.com/chat/completions';
        var currentModel = safeStorageGet('chat_model') || 'deepseek-v4-flash';
        var deepThink = safeStorageGet('chat_deep_think') === 'true';
        var currentConvId = safeStorageGet('chat_current_id') || '';
        var historyFilter = 'all';
        var historySearch = '';
        var historyPage = 1;
        var ITEMS_PER_PAGE = 10;

        var _storageOk = true;
        function safeStorageGet(key) {
            if (!_storageOk) return null;
            try { return localStorage.getItem(key); } catch (e) { _storageOk = false; return null; }
        }
        function safeStorageSet(key, val) {
            if (!_storageOk) return;
            try { localStorage.setItem(key, val); } catch (e) { _storageOk = false; }
        }

        function getHistory() {
            try {
                return JSON.parse(safeStorageGet('chat_conversations')) || [];
            } catch (e) {
                return [];
            }
        }

        function saveHistory(list) {
            safeStorageSet('chat_conversations', JSON.stringify(list));
        }

        function generateId() {
            return 'conv_' + Date.now() + '_' + Math.random().toString(36).slice(2, 8);
        }

        function getConversation(id) {
            var list = getHistory();
            for (var i = 0; i < list.length; i++) {
                if (list[i].id === id) return list[i];
            }
            return null;
        }

        function saveConversation(conv) {
            var list = getHistory();
            var updated = false;
            for (var i = 0; i < list.length; i++) {
                if (list[i].id === conv.id) {
                    list[i] = conv;
                    updated = true;
                    break;
                }
            }
            if (!updated) {
                list.unshift(conv);
            }
            saveHistory(list);
            currentConvId = conv.id;
            safeStorageSet('chat_current_id', currentConvId);
        }

        function deleteConversation(id) {
            var list = getHistory();
            list = list.filter(function(c) { return c.id !== id; });
            saveHistory(list);
            if (currentConvId === id) {
                currentConvId = '';
                safeStorageSet('chat_current_id', '');
            }
        }

        function ensureConversation() {
            if (currentConvId && getConversation(currentConvId)) return currentConvId;
            var conv = {
                id: generateId(),
                title: '',
                model: currentModel,
                models: [currentModel],
                messages: [
                    { role: 'system', content: '你是一个有帮助的助手。请用中文回答。' }
                ],
                createdAt: Date.now(),
                updatedAt: Date.now()
            };
            saveConversation(conv);
            return conv.id;
        }

        function showToast(msg) {
            var container = document.getElementById('toastContainer');
            var el = document.createElement('div');
            el.className = 'toast';
            el.textContent = msg;
            container.appendChild(el);
            setTimeout(function() {
                if (el.parentNode) el.parentNode.removeChild(el);
            }, 2200);
        }

        function toggleSettings() {
            document.getElementById('apiKeyPanel').classList.toggle('open');
        }

        function escapeHtml(text) {
            var div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function formatMessageTime(ts) {
            if (!ts) return '';
            var d = new Date(ts);
            var now = new Date();
            var pad = function(n) { return n < 10 ? '0' + n : '' + n; };
            var time = pad(d.getHours()) + ':' + pad(d.getMinutes());
            if (d.toDateString() === now.toDateString()) return time;
            return (d.getMonth() + 1) + '-' + pad(d.getDate()) + ' ' + time;
        }

        function renderConversationMessages(conv) {
            var html = '';
            var msgs = conv.messages;
            for (var i = 0; i < msgs.length; i++) {
                var m = msgs[i];
                if (m.role === 'system') continue;
                if (i > 1 && msgs[i - 1] && msgs[i - 1].role !== 'system') {
                    html += '<hr class="conv-divider">';
                }
                var timeHtml = m.timestamp ? '<span class="conv-msg-time">' + escapeHtml(formatMessageTime(m.timestamp)) + '</span>' : '';
                if (m.role === 'user') {
                    html += '<div class="conv-msg"><div class="conv-msg-label">你' + timeHtml + '</div><div class="conv-msg-content">' + escapeHtml(m.content) + '</div></div>';
                } else if (m.role === 'assistant') {
                    var reasoning = m.reasoning_content || '';
                    if (deepThink && reasoning) {
                        html += '<div class="reasoning-box"><div class="reasoning-box-header">💭 思考过程</div><div class="reasoning-box-body">' + escapeHtml(reasoning) + '</div></div>';
                    }
                    var msgModel = m.model;
                    var badgeHtml = '';
                    if (msgModel) {
                        var badgeCls = msgModel === 'deepseek-reasoner' ? 'r1-inline' : 'v4-inline';
                        var badgeLabel = msgModel === 'deepseek-reasoner' ? 'R1' : 'V4';
                        badgeHtml = '<span class="conv-msg-badge ' + badgeCls + '">' + badgeLabel + '</span>';
                    }
                    html += '<div class="conv-msg"><div class="conv-msg-label">AI' + timeHtml + '</div><div class="conv-msg-content">' + escapeHtml(m.content || '') + '</div>' + badgeHtml + '</div>';
                }
            }
            return html;
        }

        function switchModel(model) {
            currentModel = model;
            safeStorageSet('chat_model', model);

            var btns = document.querySelectorAll('.model-btn');
            for (var i = 0; i < btns.length; i++) {
                btns[i].classList.remove('active');
                if (btns[i].getAttribute('data-model') === model) {
                    btns[i].classList.add('active');
                }
            }

            var thinkRow = document.getElementById('thinkToggleRow');
            if (model === 'deepseek-reasoner') {
                thinkRow.classList.add('show');
            } else {
                thinkRow.classList.remove('show');
            }
        }

        function toggleDeepThink() {
            deepThink = document.getElementById('thinkCheckbox').checked;
            safeStorageSet('chat_deep_think', deepThink ? 'true' : 'false');
        }

        function toggleHistory() {
            var panel = document.getElementById('historyPanel');
            var backdrop = document.getElementById('historyBackdrop');
            var isOpen = panel.classList.contains('show');
            if (isOpen) {
                closeHistory();
            } else {
                panel.classList.add('show');
                backdrop.classList.add('show');
                historyPage = 1;
                renderHistory();
            }
        }

        function closeHistory() {
            document.getElementById('historyPanel').classList.remove('show');
            document.getElementById('historyBackdrop').classList.remove('show');
        }

        function setHistoryFilter(filter) {
            historyFilter = filter;
            historyPage = 1;
            var btns = document.querySelectorAll('#historyFilters .history-filter-btn');
            for (var i = 0; i < btns.length; i++) {
                btns[i].classList.remove('active');
                if (btns[i].getAttribute('data-filter') === filter) {
                    btns[i].classList.add('active');
                }
            }
            renderHistory();
        }

        function getFilteredHistory() {
            var list = getHistory();
            var search = document.getElementById('historySearch').value.trim().toLowerCase();

            if (historyFilter !== 'all') {
                list = list.filter(function(c) {
                    var models = c.models || [c.model];
                    return models.indexOf(historyFilter) !== -1;
                });
            }
            if (search) {
                list = list.filter(function(c) {
                    return (c.title || '新对话').toLowerCase().indexOf(search) !== -1;
                });
            }
            list.sort(function(a, b) { return b.updatedAt - a.updatedAt; });
            return list;
        }

        function formatDate(ts) {
            var d = new Date(ts);
            var now = new Date();
            var pad = function(n) { return n < 10 ? '0' + n : '' + n; };
            if (d.toDateString() === now.toDateString()) {
                return '今天 ' + pad(d.getHours()) + ':' + pad(d.getMinutes());
            }
            var yesterday = new Date(now);
            yesterday.setDate(yesterday.getDate() - 1);
            if (d.toDateString() === yesterday.toDateString()) {
                return '昨天 ' + pad(d.getHours()) + ':' + pad(d.getMinutes());
            }
            return (d.getMonth() + 1) + '/' + d.getDate() + ' ' + pad(d.getHours()) + ':' + pad(d.getMinutes());
        }

        function renderHistory() {
            var listEl = document.getElementById('historyList');
            var paginationEl = document.getElementById('historyPagination');
            var filtered = getFilteredHistory();
            var total = filtered.length;
            var totalPages = Math.ceil(total / ITEMS_PER_PAGE) || 1;
            if (historyPage > totalPages) historyPage = totalPages;

            var start = (historyPage - 1) * ITEMS_PER_PAGE;
            var pageItems = filtered.slice(start, start + ITEMS_PER_PAGE);

            if (pageItems.length === 0) {
                listEl.innerHTML = '<div class="history-empty">暂无聊天记录</div>';
            } else {
                var html = '';
                for (var i = 0; i < pageItems.length; i++) {
                    var c = pageItems[i];
                    var models = c.models || [c.model];
                    var title = c.title || '新对话';
                    var badgesHtml = '';
                    for (var j = 0; j < models.length; j++) {
                        var isR1 = models[j] === 'deepseek-reasoner';
                        badgesHtml += '<span class="version-badge ' + (isR1 ? 'r1' : 'v4') + '">' + (isR1 ? 'R1' : 'V4') + '</span>';
                    }
                    html += '<div class="history-item" data-id="' + c.id + '" onclick="loadConversation(\'' + c.id + '\')">' +
                        '<button class="history-item-delete" onclick="event.stopPropagation();confirmDelete(\'' + c.id + '\')" title="删除">×</button>' +
                        '<button class="history-item-rename" onclick="event.stopPropagation();startRename(\'' + c.id + '\')" title="重命名">✎</button>' +
                        '<div class="history-item-title" id="title-' + c.id + '">' + escapeHtml(title) + '</div>' +
                        '<div class="history-item-meta">' +
                            badgesHtml +
                            '<span>' + formatDate(c.updatedAt) + '</span>' +
                        '</div>' +
                    '</div>';
                }
                listEl.innerHTML = html;
            }

            var pageHtml = '';
            pageHtml += '<button class="history-page-btn" onclick="historyPage=1;renderHistory()" ' + (historyPage <= 1 ? 'disabled' : '') + '>«</button>';
            pageHtml += '<button class="history-page-btn" onclick="if(historyPage>1){historyPage--;renderHistory()}" ' + (historyPage <= 1 ? 'disabled' : '') + '>‹</button>';
            pageHtml += '<span>' + historyPage + ' / ' + totalPages + '</span>';
            pageHtml += '<button class="history-page-btn" onclick="if(historyPage<totalPages){historyPage++;renderHistory()}" ' + (historyPage >= totalPages ? 'disabled' : '') + '>›</button>';
            pageHtml += '<button class="history-page-btn" onclick="historyPage=totalPages;renderHistory()" ' + (historyPage >= totalPages ? 'disabled' : '') + '>»</button>';
            paginationEl.innerHTML = pageHtml;
        }

        function confirmDelete(id) {
            var conv = getConversation(id);
            var title = (conv && conv.title) || '新对话';
            if (confirm('确定删除 "' + title + '" 吗？')) {
                deleteConversation(id);
                showToast('已删除');
                if (!currentConvId) {
                    clearChatUI();
                }
                renderHistory();
            }
        }

        function startRename(id) {
            var conv = getConversation(id);
            if (!conv) return;
            var oldTitle = conv.title || '新对话';
            var titleEl = document.getElementById('title-' + id);
            if (!titleEl) return;
            titleEl.style.display = 'none';

            var itemEl = titleEl.parentNode;
            var existingWrap = itemEl.querySelector('.history-title-edit-wrap');
            if (existingWrap) existingWrap.parentNode.removeChild(existingWrap);

            var wrap = document.createElement('div');
            wrap.className = 'history-title-edit-wrap';
            wrap.innerHTML = '<input type="text" class="history-title-edit-input" value="' + escapeHtml(oldTitle === '新对话' ? '' : oldTitle) + '" placeholder="输入标题..." maxlength="30">' +
                '<button class="history-title-edit-btn history-title-edit-confirm" title="确认">✓</button>' +
                '<button class="history-title-edit-btn history-title-edit-cancel" title="取消">✕</button>';
            itemEl.insertBefore(wrap, titleEl.nextSibling);

            var input = wrap.querySelector('.history-title-edit-input');
            input.focus();
            input.select();

            wrap.querySelector('.history-title-edit-confirm').onclick = function(e) {
                e.stopPropagation();
                confirmRename(id, input.value.trim());
            };
            wrap.querySelector('.history-title-edit-cancel').onclick = function(e) {
                e.stopPropagation();
                cancelRename(id);
            };
            input.addEventListener('keydown', function(e) {
                if (e.key === 'Enter') {
                    e.preventDefault();
                    confirmRename(id, input.value.trim());
                } else if (e.key === 'Escape') {
                    cancelRename(id);
                }
            });
        }

        function confirmRename(id, newTitle) {
            if (!newTitle) {
                showToast('标题不能为空');
                return;
            }
            if (newTitle.length > 30) {
                showToast('标题不能超过30个字');
                return;
            }
            if (/[<>{}[\]\\]/.test(newTitle)) {
                showToast('标题包含非法字符');
                return;
            }
            var conv = getConversation(id);
            if (conv) {
                conv.title = newTitle;
                conv.updatedAt = Date.now();
                saveConversation(conv);
                showToast('已重命名');
            }
            cancelRename(id);
            renderHistory();
        }

        function cancelRename(id) {
            var titleEl = document.getElementById('title-' + id);
            if (titleEl) titleEl.style.display = '';
            var itemEl = titleEl ? titleEl.parentNode : null;
            if (itemEl) {
                var wrap = itemEl.querySelector('.history-title-edit-wrap');
                if (wrap) wrap.parentNode.removeChild(wrap);
            }
        }

        function loadConversation(id) {
            var conv = getConversation(id);
            if (!conv) return;
            currentConvId = id;
            safeStorageSet('chat_current_id', id);

            if (conv.model !== currentModel) {
                switchModel(conv.model);
            }

            var responseCard = document.getElementById('responseCard');
            var responseBody = document.getElementById('responseBody');
            var emptyHint = document.getElementById('emptyHint');

            var html = renderConversationMessages(conv);
            if (html) {
                responseCard.classList.add('show');
                emptyHint.style.display = 'none';
                responseBody.innerHTML = html;
            } else {
                clearChatUI();
            }

            closeHistory();
            showToast('已加载对话');
        }

        function newConversation() {
            currentConvId = '';
            safeStorageSet('chat_current_id', '');
            clearChatUI();
            closeHistory();
            showToast('新对话');
        }

        function clearChatUI() {
            document.getElementById('responseCard').classList.remove('show');
            document.getElementById('responseBody').innerHTML = '';
            document.getElementById('emptyHint').style.display = '';
        }

        function sendMessage() {
            var input = document.getElementById('userInput');
            var apiKey = document.getElementById('apiKey').value.trim();
            var message = input.value.trim();
            var btn = document.getElementById('sendBtn');
            var responseCard = document.getElementById('responseCard');
            var responseBody = document.getElementById('responseBody');
            var emptyHint = document.getElementById('emptyHint');

            if (!message) return;

            if (!apiKey) {
                toggleSettings();
                return;
            }

            btn.disabled = true;
            btn.innerHTML = '思考中';
            responseCard.classList.add('show');
            emptyHint.style.display = 'none';
            responseBody.innerHTML = '<div class="loading-text"><span class="loading-dots">AI 正在思考</span></div>';

            var convId = ensureConversation();
            var conv = getConversation(convId);
            conv.model = currentModel;
            conv.messages.push({ role: 'user', content: message, timestamp: Date.now() });
            conv.updatedAt = Date.now();

            var body = {
                model: currentModel,
                messages: conv.messages,
                stream: false,
                temperature: 0.7
            };

            var xhr = new XMLHttpRequest();
            xhr.open('POST', API_URL, true);
            xhr.setRequestHeader('Content-Type', 'application/json');
            xhr.setRequestHeader('Authorization', 'Bearer ' + apiKey);
            xhr.timeout = 60000;

            xhr.onload = function() {
                try {
                    var data = JSON.parse(xhr.responseText);
                    var msg = (data.choices && data.choices[0] && data.choices[0].message) || {};
                    var reply = msg.content || '（无回复内容）';
                    var reasoning = msg.reasoning_content || '';

                    conv.messages.push({
                        role: 'assistant',
                        content: reply,
                        reasoning_content: reasoning,
                        timestamp: Date.now(),
                        model: currentModel
                    });
                    conv.updatedAt = Date.now();
                    conv.models = conv.models || [];
                    if (conv.models.indexOf(currentModel) === -1) {
                        conv.models.push(currentModel);
                    }
                    saveConversation(conv);

                    responseBody.innerHTML = renderConversationMessages(conv);
                } catch (e) {
                    if (xhr.status >= 200 && xhr.status < 300) {
                        responseBody.innerHTML = '<div class="error-box">响应解析失败</div>';
                    } else {
                        var errMsg = '请求失败 (' + xhr.status + ')';
                        try {
                            var errData = JSON.parse(xhr.responseText);
                            errMsg = (errData.error && errData.error.message) || errMsg;
                        } catch (ex) {}
                        responseBody.innerHTML = '<div class="error-box">' + escapeHtml(errMsg) + '</div>';
                        var convAfterErr = getConversation(convId);
                        if (convAfterErr) {
                            convAfterErr.messages.pop();
                            convAfterErr.updatedAt = Date.now();
                            saveConversation(convAfterErr);
                        }
                    }
                }
                btn.disabled = false;
                btn.innerHTML = '发送 <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>';
                input.value = '';
                document.getElementById('charCount').textContent = '0 / 4000';
                input.focus();
            };

            xhr.onerror = function() {
                responseBody.innerHTML = '<div class="error-box">网络请求失败，请检查网络连接</div>';
                btn.disabled = false;
                btn.innerHTML = '发送 <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>';
            };

            xhr.ontimeout = function() {
                responseBody.innerHTML = '<div class="error-box">请求超时，请稍后重试</div>';
                btn.disabled = false;
                btn.innerHTML = '发送 <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>';
            };

            xhr.send(JSON.stringify(body));
        }

        document.getElementById('userInput').addEventListener('input', function() {
            document.getElementById('charCount').textContent = this.value.length + ' / 4000';
        });

        document.getElementById('userInput').addEventListener('keydown', function(e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });

        document.getElementById('historySearch').addEventListener('input', function() {
            historyPage = 1;
            renderHistory();
        });

        var savedKey = safeStorageGet('deepseek_api_key');
        if (savedKey) {
            document.getElementById('apiKey').value = savedKey;
        }

        document.getElementById('apiKey').addEventListener('change', function() {
            safeStorageSet('deepseek_api_key', this.value);
        });

        function exportHistory() {
            var list = getFilteredHistory();
            if (list.length === 0) {
                showToast('没有可导出的记录');
                return;
            }
            var exportData = list.map(function(c) {
                return {
                    title: c.title || '新对话',
                    model: c.model,
                    createdAt: new Date(c.createdAt).toLocaleString('zh-CN'),
                    updatedAt: new Date(c.updatedAt).toLocaleString('zh-CN'),
                    messages: c.messages.filter(function(m) { return m.role !== 'system'; })
                };
            });
            var blob;
            try { blob = new Blob([JSON.stringify(exportData, null, 2)], { type: 'application/json' }); } catch (e) { blob = null; }
            if (blob && window.URL && window.URL.createObjectURL) {
                var url = URL.createObjectURL(blob);
                var a = document.createElement('a');
                a.href = url;
                a.download = 'deepseek-chat-' + new Date().toISOString().slice(0, 10) + '.json';
                a.click();
                URL.revokeObjectURL(url);
            } else {
                window.open('data:application/json;charset=utf-8,' + encodeURIComponent(JSON.stringify(exportData, null, 2)));
            }
            showToast('导出成功');
        }

        switchModel(currentModel);
        document.getElementById('thinkCheckbox').checked = deepThink;

        if (currentConvId && getConversation(currentConvId)) {
            loadConversation(currentConvId);
        }

        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape') {
                closeHistory();
            }
        });
    </script>
</body>
</html>
