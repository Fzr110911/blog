<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DeepSeek</title>
    <link rel="icon" type="image/png" href="logo.png">
    <style>
        :root {
            --bg: #f8f6f2;
            --card: #ffffff;
            --border: #e6e3de;
            --text: #2c2c2c;
            --text-secondary: #6b6b6b;
            --text-muted: #999;
            --accent: #1a1a1a;
            --accent-hover: #333;
            --divider: #eeecea;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: "Inter", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", "Noto Sans SC", -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.75;
            letter-spacing: 0.01em;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px 60px;
        }

        .page {
            width: 100%;
            max-width: 640px;
        }

        .header {
            text-align: center;
            padding: 48px 0 40px;
        }

        .header-icon {
            width: 48px;
            height: 48px;
            margin: 0 auto 20px;
            background: var(--accent);
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            font-weight: 700;
            color: #fff;
            letter-spacing: 0;
        }

        .header h1 {
            font-size: 22px;
            font-weight: 600;
            color: var(--text);
            letter-spacing: 0.02em;
        }

        .header p {
            font-size: 14px;
            color: var(--text-muted);
            margin-top: 6px;
            font-weight: 400;
        }

        .settings-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
        }

        .home-link {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            font-size: 13px;
            color: var(--text-muted);
            text-decoration: none;
            padding: 6px 12px;
            border-radius: 6px;
            letter-spacing: 0.02em;
        }

        .home-link:hover {
            color: var(--text);
            background: rgba(0,0,0,0.04);
        }

        .settings-btn {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            font-size: 13px;
            color: var(--text-muted);
            background: none;
            border: none;
            cursor: pointer;
            padding: 6px 12px;
            border-radius: 6px;
            font-family: inherit;
            letter-spacing: 0.02em;
        }

        .settings-btn:hover {
            color: var(--text);
            background: rgba(0,0,0,0.04);
        }

        .settings-btn svg {
            width: 15px;
            height: 15px;
            opacity: 0.5;
        }

        .api-key-panel {
            display: none;
            margin-bottom: 20px;
            padding: 18px 20px;
            background: var(--card);
            border-radius: 12px;
            border: 1px solid var(--border);
        }

        .api-key-panel.open {
            display: block;
        }

        .api-key-panel label {
            display: block;
            font-size: 12px;
            font-weight: 600;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.06em;
            margin-bottom: 10px;
        }

        .api-key-panel input {
            width: 100%;
            padding: 10px 14px;
            border: 1px solid var(--border);
            border-radius: 8px;
            font-size: 14px;
            font-family: inherit;
            color: var(--text);
            background: #fafaf8;
            letter-spacing: 0.02em;
            outline: none;
        }

        .api-key-panel input:focus {
            border-color: #aaa;
            background: #fff;
        }

        .api-key-panel .hint {
            font-size: 12px;
            color: var(--text-muted);
            margin-top: 8px;
        }

        .input-card {
            background: var(--card);
            border-radius: 14px;
            border: 1px solid var(--border);
            overflow: hidden;
        }

        .input-card textarea {
            width: 100%;
            min-height: 140px;
            padding: 20px 22px;
            border: none;
            font-size: 16px;
            font-family: inherit;
            color: var(--text);
            line-height: 1.75;
            letter-spacing: 0.02em;
            resize: vertical;
            outline: none;
            background: transparent;
        }

        .input-card textarea::placeholder {
            color: #c0bdb8;
        }

        .input-card-footer {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 16px;
            border-top: 1px solid var(--divider);
            background: #fdfdfc;
        }

        .input-card-footer .char-count {
            font-size: 12px;
            color: var(--text-muted);
        }

        .submit-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 10px 22px;
            background: var(--accent);
            color: #fff;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            font-family: inherit;
            letter-spacing: 0.03em;
            cursor: pointer;
        }

        .submit-btn:hover {
            background: var(--accent-hover);
        }

        .submit-btn:active {
            transform: scale(0.97);
        }

        .submit-btn:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
        }

        .submit-btn svg {
            width: 16px;
            height: 16px;
        }

        .response-card {
            display: none;
            margin-top: 20px;
            background: var(--card);
            border-radius: 14px;
            border: 1px solid var(--border);
            overflow: hidden;
        }

        .response-card.show {
            display: block;
        }

        .response-card-header {
            padding: 14px 22px;
            border-bottom: 1px solid var(--divider);
            font-size: 12px;
            font-weight: 600;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.06em;
            background: #fdfdfc;
        }

        .response-card-body {
            padding: 22px 24px;
        }

        .response-card-body .content {
            white-space: pre-wrap;
            word-wrap: break-word;
            font-size: 16px;
            line-height: 1.85;
            color: var(--text);
        }

        .response-card-body .loading-text {
            text-align: center;
            color: var(--text-muted);
            padding: 20px 0;
            font-size: 14px;
            letter-spacing: 0.02em;
        }

        .response-card-body .loading-dots::after {
            content: '';
            animation: dots 1.5s steps(3, end) infinite;
        }

        @keyframes dots {
            0%   { content: ''; }
            25%  { content: '.'; }
            50%  { content: '..'; }
            75%  { content: '...'; }
            100% { content: '...'; }
        }

        .response-card-body .error-box {
            color: #b33a3a;
            background: #fdf7f7;
            padding: 16px 18px;
            border-radius: 8px;
            font-size: 14px;
            line-height: 1.6;
            border: 1px solid #f0dada;
        }

        .empty-hint {
            text-align: center;
            padding: 48px 0 24px;
            color: var(--text-muted);
            font-size: 14px;
            letter-spacing: 0.02em;
        }

        @media (max-width: 520px) {
            body {
                padding: 16px 12px 40px;
            }

            .header {
                padding: 28px 0 24px;
            }

            .header h1 {
                font-size: 20px;
            }

            .input-card textarea {
                font-size: 15px;
                min-height: 120px;
                padding: 16px 18px;
            }

            .response-card-body {
                padding: 18px;
            }

            .response-card-body .content {
                font-size: 15px;
            }

            .submit-btn {
                padding: 10px 18px;
                font-size: 13px;
            }
        }
    </style>
</head>
<body>
    <div class="page">

        <div class="header">
            <div class="header-icon">QL</div>
            <h1>DeepSeek</h1>
            <p>每一次对话，都是一次探索</p>
        </div>

        <div class="settings-row">
            <a href="index.html" class="home-link">← 首页</a>
            <button class="settings-btn" onclick="toggleSettings()">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="12" cy="12" r="3"></circle>
                    <path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"></path>
                </svg>
                设置
            </button>
        </div>

        <div class="api-key-panel" id="apiKeyPanel">
            <label for="apiKey">API Key</label>
            <input type="password" id="apiKey" placeholder="sk-xxxxxxxxxxxxxxxx">
            <div class="hint">密钥仅保存在本地浏览器，不会上传</div>
        </div>

        <div class="input-card">
            <textarea id="userInput" placeholder="输入你的问题..."></textarea>
            <div class="input-card-footer">
                <span class="char-count" id="charCount">0 / 4000</span>
                <button class="submit-btn" onclick="sendMessage()" id="sendBtn">
                    发送
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                        <line x1="22" y1="2" x2="11" y2="13"></line>
                        <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                    </svg>
                </button>
            </div>
        </div>

        <div class="empty-hint" id="emptyHint">输入问题并发送，获取 DeepSeek 的回答</div>

        <div class="response-card" id="responseCard">
            <div class="response-card-header">回答</div>
            <div class="response-card-body" id="responseBody"></div>
        </div>
    </div>

    <script>
        var API_URL = 'https://api.deepseek.com/chat/completions';

        function toggleSettings() {
            document.getElementById('apiKeyPanel').classList.toggle('open');
        }

        function escapeHtml(text) {
            var div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function sendMessage() {
            var input = document.getElementById('userInput');
            var apiKey = document.getElementById('apiKey').value.trim();
            var message = input.value.trim();
            var btn = document.getElementById('sendBtn');
            var responseCard = document.getElementById('responseCard');
            var responseBody = document.getElementById('responseBody');
            var emptyHint = document.getElementById('emptyHint');

            if (!message) return;

            if (!apiKey) {
                toggleSettings();
                return;
            }

            btn.disabled = true;
            btn.innerHTML = '思考中';
            responseCard.classList.add('show');
            emptyHint.style.display = 'none';
            responseBody.innerHTML = '<div class="loading-text"><span class="loading-dots">AI 正在思考</span></div>';

            var messages = [
                { role: 'system', content: '你是一个有帮助的助手。请用中文回答。' },
                { role: 'user', content: message }
            ];

            fetch(API_URL, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': 'Bearer ' + apiKey
                },
                body: JSON.stringify({
                    model: 'deepseek-chat',
                    messages: messages,
                    stream: false,
                    temperature: 0.7
                })
            })
            .then(function(res) {
                if (!res.ok) {
                    return res.json().then(function(err) {
                        throw new Error(err.error?.message || '请求失败 (' + res.status + ')');
                    }, function() {
                        throw new Error('请求失败 (' + res.status + ')');
                    });
                }
                return res.json();
            })
            .then(function(data) {
                var reply = data.choices[0]?.message?.content || '（无回复内容）';
                responseBody.innerHTML = '<div class="content">' + escapeHtml(reply) + '</div>';
            })
            .catch(function(err) {
                responseBody.innerHTML = '<div class="error-box">' + escapeHtml(err.message) + '</div>';
            })
            .finally(function() {
                btn.disabled = false;
                btn.innerHTML = '发送 <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>';
            });
        }

        document.getElementById('userInput').addEventListener('input', function() {
            document.getElementById('charCount').textContent = this.value.length + ' / 4000';
        });

        document.getElementById('userInput').addEventListener('keydown', function(e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });

        var savedKey = localStorage.getItem('deepseek_api_key');
        if (savedKey) {
            document.getElementById('apiKey').value = savedKey;
        }

        document.getElementById('apiKey').addEventListener('change', function() {
            localStorage.setItem('deepseek_api_key', this.value);
        });
    </script>
</body>
</html>
