<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>今日</title>
    <link rel="icon" type="image/png" href="logo.png">
    <style>
        :root {
            --bg: #f8f6f2;
            --card: #ffffff;
            --border: #e6e3de;
            --text: #2c2c2c;
            --text-secondary: #6b6b6b;
            --text-muted: #999;
            --accent: #1a1a1a;
            --divider: #eeecea;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", "Noto Serif SC", "Source Han Serif SC", "Noto Sans SC", serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.75;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 32px 20px 60px;
        }

        .page {
            width: 100%;
            max-width: 600px;
        }

        /* Top bar */
        .top-bar {
            display: flex;
            justify-content: flex-end;
            margin-bottom: 12px;
        }

        .nav-link {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            font-size: 13px;
            color: var(--text-muted);
            text-decoration: none;
            padding: 6px 14px;
            border-radius: 6px;
            font-family: "PingFang SC", "Microsoft YaHei", sans-serif;
            letter-spacing: 0.02em;
        }

        .nav-link:hover {
            color: var(--text);
            background: rgba(0,0,0,0.04);
        }

        .nav-link svg {
            width: 15px;
            height: 15px;
            opacity: 0.5;
        }

        /* Date Block */
        .date-block {
            text-align: center;
            padding: 36px 0 32px;
        }

        .date-weekday {
            font-size: 15px;
            color: var(--text-muted);
            font-weight: 400;
            letter-spacing: 0.04em;
            margin-bottom: 8px;
        }

        .date-main {
            font-size: 38px;
            font-weight: 200;
            letter-spacing: 0.04em;
            color: var(--text);
            line-height: 1.2;
        }

        .date-lunar {
            font-size: 14px;
            color: var(--text-muted);
            margin-top: 8px;
            letter-spacing: 0.03em;
        }

        /* Quote Card */
        .quote-card {
            background: var(--card);
            border-radius: 14px;
            border: 1px solid var(--border);
            padding: 28px 28px 22px;
            text-align: center;
            position: relative;
        }

        .quote-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 40px;
            height: 3px;
            background: var(--accent);
            border-radius: 0 0 2px 2px;
        }

        .quote-text {
            font-size: 20px;
            line-height: 1.8;
            color: var(--text);
            font-weight: 400;
            letter-spacing: 0.04em;
            margin-bottom: 14px;
        }

        .quote-author {
            font-size: 13px;
            color: var(--text-muted);
            letter-spacing: 0.04em;
        }

        .quote-author::before {
            content: '—— ';
        }

        .quote-next-btn {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            margin-top: 18px;
            padding: 8px 20px;
            border: 1px solid var(--border);
            border-radius: 8px;
            background: transparent;
            color: var(--text-muted);
            font-size: 13px;
            font-family: inherit;
            letter-spacing: 0.03em;
            cursor: pointer;
        }

        .quote-next-btn:hover {
            color: var(--text);
            border-color: #ccc;
            background: rgba(0,0,0,0.02);
        }

        .quote-next-btn:active {
            transform: scale(0.97);
        }

        .quote-next-btn svg {
            width: 15px;
            height: 15px;
            opacity: 0.6;
        }

        /* Refresh hint */
        .refresh-hint {
            text-align: center;
            margin-top: 18px;
            font-size: 12px;
            color: var(--text-muted);
            letter-spacing: 0.03em;
        }

        .refresh-hint span {
            cursor: pointer;
            border-bottom: 1px dashed var(--border);
        }

        .refresh-hint span:hover {
            color: var(--text);
        }

        /* Footer */
        .footer {
            text-align: center;
            padding: 36px 0 0;
            font-size: 12px;
            color: #ccc;
            letter-spacing: 0.04em;
        }

        @media (max-width: 520px) {
            body {
                padding: 16px 12px 40px;
            }

            .date-block {
                padding: 24px 0 24px;
            }

            .date-main {
                font-size: 30px;
            }

            .quote-card {
                padding: 22px 20px 18px;
            }

            .quote-text {
                font-size: 18px;
            }
        }
    </style>
</head>
<body>
    <div class="page">

        <div class="top-bar">
            <a href="chat.html" class="nav-link">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">

        <div class="quote-card" id="quoteCard">

                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">

            </button>
        </div>

        <div class="footer">今日</div>
    </div>

    <script>

            { text: '山重水复疑无路，柳暗花明又一村。', author: '陆游《游山西村》' },

            { text: '不畏浮云遮望眼，自缘身在最高层。', author: '王安石《登飞来峰》' },

            { text: '海内存知己，天涯若比邻。', author: '王勃《送杜少府之任蜀州》' },
            { text: '莫愁前路无知己，天下谁人不识君。', author: '高适《别董大》' },
            { text: '欲穷千里目，更上一层楼。', author: '王之涣《登鹳雀楼》' },
            { text: '千磨万击还坚劲，任尔东西南北风。', author: '郑燮《竹石》' },

            { text: '纸上得来终觉浅，绝知此事要躬行。', author: '陆游《冬夜读书示子聿》' },
            { text: '问渠那得清如许，为有源头活水来。', author: '朱熹《观书有感》' },
            { text: '衣带渐宽终不悔，为伊消得人憔悴。', author: '柳永《蝶恋花》' },
            { text: '众里寻他千百度，蓦然回首，那人却在灯火阑珊处。', author: '辛弃疾《青玉案·元夕》' },
            { text: '人生自古谁无死，留取丹心照汗青。', author: '文天祥《过零丁洋》' },
            { text: '天生我材必有用，千金散尽还复来。', author: '李白《将进酒》' },
            { text: '采菊东篱下，悠然见南山。', author: '陶渊明《饮酒》' },
            { text: '大漠孤烟直，长河落日圆。', author: '王维《使至塞上》' },
            { text: '落霞与孤鹜齐飞，秋水共长天一色。', author: '王勃《滕王阁序》' },
            { text: '但愿人长久，千里共婵娟。', author: '苏轼《水调歌头》' },
            { text: '竹杖芒鞋轻胜马，谁怕？一蓑烟雨任平生。', author: '苏轼《定风波》' },
            { text: '醉里挑灯看剑，梦回吹角连营。', author: '辛弃疾《破阵子》' },
            { text: '此情可待成追忆，只是当时已惘然。', author: '李商隐《锦瑟》' },
            { text: '曾经沧海难为水，除却巫山不是云。', author: '元稹《离思》' },
            { text: '春蚕到死丝方尽，蜡炬成灰泪始干。', author: '李商隐《无题》' },
            { text: '老骥伏枥，志在千里。烈士暮年，壮心不已。', author: '曹操《龟虽寿》' },
            { text: '非淡泊无以明志，非宁静无以致远。', author: '诸葛亮《诫子书》' },
            { text: '路漫漫其修远兮，吾将上下而求索。', author: '屈原《离骚》' },
            { text: '博观而约取，厚积而薄发。', author: '苏轼' },
            { text: '业精于勤，荒于嬉；行成于思，毁于随。', author: '韩愈《进学解》' },
            { text: '天下事有难易乎？为之，则难者亦易矣。', author: '彭端淑《为学》' },
            { text: '三人行，必有我师焉。', author: '《论语》' },

            { text: '知之为知之，不知为不知，是知也。', author: '《论语》' },
            { text: '千里之行，始于足下。', author: '《道德经》' },
            { text: '合抱之木，生于毫末；九层之台，起于累土。', author: '《道德经》' },
            { text: '天行健，君子以自强不息。', author: '《周易》' },
            { text: '地势坤，君子以厚德载物。', author: '《周易》' },
            { text: '穷则独善其身，达则兼济天下。', author: '《孟子》' },
            { text: '不以规矩，不能成方圆。', author: '《孟子》' },
            { text: '海上生明月，天涯共此时。', author: '张九龄《望月怀远》' },
            { text: '春风得意马蹄疾，一日看尽长安花。', author: '孟郊《登科后》' },

            { text: '举杯邀明月，对影成三人。', author: '李白《月下独酌》' },

            { text: '烽火连三月，家书抵万金。', author: '杜甫《春望》' },
            { text: '朱门酒肉臭，路有冻死骨。', author: '杜甫《自京赴奉先县咏怀五百字》' },
            { text: '无边落木萧萧下，不尽长江滚滚来。', author: '杜甫《登高》' },
            { text: '正是江南好风景，落花时节又逢君。', author: '杜甫《江南逢李龟年》' },
            { text: '两个黄鹂鸣翠柳，一行白鹭上青天。', author: '杜甫《绝句》' },
            { text: '随风潜入夜，润物细无声。', author: '杜甫《春夜喜雨》' },

            { text: '感时花溅泪，恨别鸟惊心。', author: '杜甫《春望》' },

            { text: '一年好景君须记，最是橙黄橘绿时。', author: '苏轼《赠刘景文》' },
            { text: '生当作人杰，死亦为鬼雄。', author: '李清照《夏日绝句》' },
            { text: '花自飘零水自流，一种相思，两处闲愁。', author: '李清照《一剪梅》' },
            { text: '寻寻觅觅，冷冷清清，凄凄惨惨戚戚。', author: '李清照《声声慢》' },
            { text: '物是人非事事休，欲语泪先流。', author: '李清照《武陵春》' }
        ];

        function getWeekday(date) {
            var days = ['日', '一', '二', '三', '四', '五', '六'];
            return '星期' + days[date.getDay()];
        }

        function initDate() {
            var now = new Date();
            document.getElementById('dateWeekday').textContent = getWeekday(now);
            document.getElementById('dateMain').textContent = now.getFullYear() + '年' + (now.getMonth() + 1) + '月' + now.getDate() + '日';
        }

        var currentQuoteIndex = Math.floor(Math.random() * QUOTES.length);

        function showQuote(index) {
            var q = QUOTES[index];
            document.getElementById('quoteText').textContent = q.text;
            document.getElementById('quoteAuthor').textContent = q.author;
        }

        function nextQuote() {
            currentQuoteIndex = (currentQuoteIndex + 1) % QUOTES.length;
            showQuote(currentQuoteIndex);
        }

        function initQuote() {
            showQuote(currentQuoteIndex);
        }

        initDate();
        initQuote();

    </script>
</body>
</html>
