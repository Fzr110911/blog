<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>个人名片</title>
    <style>
        :root {
            --bg: #f0f0f0;
            --fg: #333;
            --muted: #666;
            --border: #ccc;
            --hover: #000;
            --accent: #4078F2;
            --shadow: 0 2px 6px rgba(0, 0, 0, 0.1);
            --transition: 0.25s ease;
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Arial', sans-serif;
        }
        
        body {
            background-color: var(--bg);
            padding: 20px;
        }
        
        .card-container {
            max-width: 900px;
            margin: 0 auto;
            position: relative;
            background-color: #e6e6e6;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: var(--shadow);
            padding: 20px;
            background-image: url('https://raw.githubusercontent.com/Fzr110911/Blog/main/bbt.png');
            background-size: cover;
            background-position: center;
        }
        
        /* 文字优化 */
        .text-layer {
            position: relative;
            z-index: 2;
        }
        
        .text-content {
            background-color: rgba(255, 255, 255, 0.7);
            padding: 2px 6px;
            border-radius: 3px;
            display: inline-block;
        }
        
        /* 字体大小优化 */
        .header-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding: 10px 0;
            border-bottom: 1px solid rgba(204, 204, 204, 0.5);
        }
        
        .page-title h1 {
            font-size: 24px;
            font-weight: bold;
            color: var(--fg);
            text-shadow: 0 1px 2px rgba(0, 0, 0, 0.2);
        }
        
        .status-text {
            font-size: 16px;
            font-weight: bold;
            color: var(--fg);
            text-shadow: 0 1px 2px rgba(0, 0, 0, 0.2);
        }
        
        .triangle-text {
            font-size: 16px;
            font-weight: bold;
            color: white;
            text-shadow: 0 1px 2px rgba(0, 0, 0, 0.5);
        }
        
        .signature {
            font-size: 28px;
            font-weight: bold;
            color: var(--fg);
            text-shadow: 0 1px 2px rgba(0, 0, 0, 0.2);
        }
        
        .location-marker h2 {
            font-size: 36px;
            font-weight: bold;
            color: var(--fg);
            text-shadow: 0 1px 2px rgba(0, 0, 0, 0.2);
        }
        
        .location-text {
            font-size: 16px;
            font-weight: bold;
            color: var(--fg);
            text-shadow: 0 1px 2px rgba(0, 0, 0, 0.2);
        }
        
        .sign {
            font-size: 14px;
            font-weight: bold;
        }
        
        .blog-logo {
            font-size: 24px;
            font-weight: bold;
        }
        
        .author {
            font-size: 18px;
            font-weight: bold;
        }
        
        .source {
            font-size: 16px;
            font-weight: bold;
        }
        
        /* 其他原有样式保持不变 */
        .nav-button {
            width: 40px;
            height: 40px;
            background-color: rgba(51, 51, 51, 0.8);
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            border-radius: 4px;
        }
        
        .page-title {
            display: flex;
            align-items: center;
        }
        
        .status-indicator {
            height: 8px;
            width: 100%;
            background-color: rgba(221, 221, 221, 0.5);
            border-radius: 4px;
            position: relative;
        }
        
        .status-indicator::after {
            content: '';
            position: absolute;
            left: 0;
            top: 0;
            height: 100%;
            width: 30%;
            background-color: #8bc34a;
            border-radius: 4px;
        }
        
        .content-area {
            position: relative;
            height: 500px;
        }
        
        .triangle {
            width: 0;
            height: 0;
            border-left: 50px solid transparent;
            border-right: 50px solid transparent;
            border-bottom: 100px solid rgba(34, 34, 34, 0.8);
            position: absolute;
            top: 20px;
            left: 20px;
        }
        
        .location-marker {
            position: absolute;
            top: 180px;
            right: 100px;
        }
        
        .street-signs {
            position: absolute;
            top: 230px;
            right: 80px;
            transform: rotate(-15deg);
        }
        
        .sign {
            background-color: rgba(34, 34, 34, 0.8);
            color: white;
            padding: 8px 10px;
            margin-bottom: 5px;
            display: inline-block;
            clip-path: polygon(0% 0%, 100% 0%, 85% 50%, 100% 100%, 0% 100%);
            text-align: center;
        }
        
        .arrow-sign {
            background-color: transparent;
            color: #222;
            border: 2px solid #222;
            padding: 8px 10px;
            margin-left: 5px;
            display: inline-block;
            clip-path: polygon(0% 0%, 100% 0%, 85% 50%, 100% 100%, 0% 100%);
        }
        
        .map-coords {
            position: absolute;
            bottom: 180px;
            left: 20px;
            display: flex;
            gap: 30px;
        }
        
        .coords-box {
            width: 20px;
            height: 20px;
            border: 1px solid #555;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        
        .large-box {
            width: 30px;
            height: 30px;
            border: 1px solid #555;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        
        .logo {
            position: absolute;
            bottom: 120px;
            left: 20px;
            display: flex;
            align-items: center;
        }
        
        .footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 20px;
            padding-top: 10px;
            border-top: 1px solid rgba(204, 204, 204, 0.5);
        }
        
        .barcode {
            position: absolute;
            bottom: 150px;
            right: 20px;
            height: 50px;
            width: 3px;
            background-color: #333;
        }
        
        .barcode::before, .barcode::after {
            content: "";
            position: absolute;
            width: 3px;
            height: 15px;
            background-color: #333;
            left: 8px;
        }
        
        .barcode::before {
            top: 5px;
        }
        
        .barcode::after {
            bottom: 5px;
        }
    </style>
</head>
<body>
    <div class="card-container">
        <!-- 顶部导航栏 -->
        <div class="header-bar">
            <div class="nav-button">←</div>
            <div class="page-title">
                <h1>TSC Special</h1>
                <div class="status-indicator"></div>
            </div>
            <div class="nav-button">+</div>
        </div>
        
        <!-- 状态文本 -->
        <div class="status-text">//Editing in progress.</div>
        
        <!-- 主内容区域 -->
        <div class="content-area">
            <!-- 黑色三角形标识 -->
            <div class="triangle"></div>
            <div class="triangle-text">NAME</div>
            
            <!-- 签名 -->
            <div class="signature">QL</div>
            
            <!-- 位置标识 -->
            <div class="location-marker">
                <h2>Man!</h2>
                <div class="location-text">What can I say</div>
                
                <!-- 街道指示牌 -->
                <div class="street-signs">
                    <div class="sign">25-1<br/>East 66th St</div>
                    <div class="sign">ONE WAY</div>
                    <div class="sign">ONE WAY</div>
                    <div class="arrow-sign">→</div>
                </div>
            </div>
            
            <!-- 地图坐标 -->
            <div class="map-coords">
                <div class="coords-box">E4</div>
                <div class="coords-box">E3</div>
                <div class="large-box">A1</div>
                <div class="coords-box">A4</div>
                <div class="coords-box">A6</div>
                <div class="coords-box">R</div>
            </div>
            
            <!-- Logo -->
            <div class="logo">
                <span style="color:#555;margin-right:5px;font-weight:bold;">YEAR</span>
                <span class="blog-logo">2011</span>
            </div>
            
            <!-- 条形码 -->
            <div class="barcode"></div>
        </div>
        
        <!-- 底部信息 -->
        <div class="footer">
            <div class="author">Dr.房子瑞</div>
            <div class="source">//·-·2099600388@qq.com</div>
        </div>
    </div>
</body>
</html>
