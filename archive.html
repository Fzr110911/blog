<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="房子瑞博客的所有文章归档，按时间倒序排列。" />
  <title>归档 · 房子瑞</title>
  <style>
    :root {
      --bg: #ffffff;
      --fg: #111111;
      --muted: #555555;
      --border: #eaeaea;
      --hover: #000000;
      --transition: 0.3s ease;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #121212;
        --fg: #eeeeee;
        --muted: #aaaaaa;
        --border: #333333;
        --hover: #ffffff;
      }
    }
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      background-color: var(--bg);
      color: var(--fg);
      line-height: 1.7;
      transition: background-color var(--transition), color var(--transition);
    }
    .container {
      max-width: 820px;
      margin: 0 auto;
      padding: 80px 24px;
    }
    header {
      text-align: center;
      margin-bottom: 64px;
    }
    header h1 {
      font-size: 2.5rem;
      font-weight: 600;
      letter-spacing: -0.5px;
    }
    nav ul {
      list-style: none;
      display: flex;
      justify-content: center;
      gap: 28px;
      margin-top: 28px;
      flex-wrap: wrap;
    }
    nav ul li a {
      text-decoration: none;
      color: var(--fg);
      font-size: 0.96rem;
      transition: color var(--transition);
    }
    nav ul li a:hover {
      color: var(--hover);
    }
    .archive-list {
      border-top: 1px solid var(--border);
      padding-top: 48px;
    }
    .archive-year {
      font-size: 1.4rem;
      font-weight: 600;
      margin: 48px 0 24px;
      color: var(--fg);
    }
    .archive-item {
      margin-bottom: 18px;
    }
    .archive-item time {
      display: inline-block;
      width: 100px;
      font-size: 0.9rem;
      color: var(--muted);
    }
    .archive-item a {
      text-decoration: none;
      color: var(--fg);
      font-size: 1.05rem;
      transition: color var(--transition);
    }
    .archive-item a:hover {
      color: var(--hover);
      text-decoration: underline;
    }
    .tag-cloud {
      margin-top: 64px;
      padding-top: 48px;
      border-top: 1px solid var(--border);
    }
    .tag-cloud h2 {
      font-size: 1.3rem;
      font-weight: 500;
      margin-bottom: 20px;
    }
    .tag-cloud ul {
      list-style: none;
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      justify-content: center;
    }
    .tag-cloud li a {
      text-decoration: none;
      color: var(--muted);
      font-size: 0.95rem;
      padding: 4px 12px;
      border: 1px solid var(--border);
      border-radius: 4px;
      transition: all var(--transition);
    }
    .tag-cloud li a:hover {
      color: var(--hover);
      border-color: var(--hover);
    }
    footer {
      margin-top: 100px;
      text-align: center;
      font-size: 0.88rem;
      color: var(--muted);
      border-top: 1px solid var(--border);
      padding-top: 40px;
    }
    footer div {
      margin-top: 10px;
    }
    footer a {
      color: var(--muted);
      text-decoration: none;
      margin: 0 10px;
      transition: color var(--transition);
    }
    footer a:hover {
      color: var(--hover);
    }
    @media (max-width: 768px) {
      .container {
        padding: 40px 16px;
      }
      header h1 {
        font-size: 2rem;
      }
      nav ul {
        flex-direction: column;
        gap: 14px;
      }
      .archive-item time {
        display: block;
        width: auto;
        margin-bottom: 4px;
      }
    }
    @media (max-width: 480px) {
      header h1 {
        font-size: 1.8rem;
      }
      .container {
        padding: 30px 12px;
      }
      nav ul {
        gap: 10px;
      }
      nav ul li a {
        font-size: 0.9rem;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>归档</h1>
      <nav>
        <ul>
          <li><a href="index.html">首页</a></li>
          <li><a href="archive.html">归档</a></li>
          <li><a href="tags.html">标签</a></li>
          <li><a href="about.html">关于</a></li>
        </ul>
      </nav>
    </header>

    <main>
      <section class="archive-list">
        <h2 class="archive-year">2026</h2>
        <div class="archive-item">
          <time datetime="2026-03-29">2026-03-29</time>
          <a href="start.html">开始</a>
        </div>
        <!-- 新增文章在此按时间倒序添加 -->
      </section>

      <section class="tag-cloud">
        <h2>标签</h2>
        <ul>
          <li><a href="tags.html#tech">技术</a></li>
          <li><a href="tags.html#product">产品</a></li>
          <li><a href="tags.html#life">生活</a></li>
          <li><a href="tags.html#reading">阅读</a></li>
        </ul>
      </section>
    </main>

    <footer>
      <p>© 2026 房子瑞 · 保留所有权利</p>
      <div>
        <a href="index.html">首页</a>
        <a href="about.html">关于</a>
      </div>
    </footer>
  </div>
</body>
</html>
